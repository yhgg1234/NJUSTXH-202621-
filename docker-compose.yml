# XH-202621 多源异构数据驱动岗位和能力图谱构建与动态演化分析研究
# Docker Compose 编排文件
# 前期先启动 Neo4j，后续逐步加入 backend、frontend、MySQL、MongoDB

services:
  # Neo4j 图数据库 —— 知识图谱存储与查询
  neo4j:
    image: neo4j:5.23.0
    container_name: xh21-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Web 管理界面
      - "7687:7687"   # Bolt 协议
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-neo4j123}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - xh21-network

  # MySQL 关系数据库 —— 岗位元数据、用户数据
  # mysql:
  #   image: mysql:8.0
