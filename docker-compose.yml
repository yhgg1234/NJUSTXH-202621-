  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   networks:
  #     - xh21-network

  # MongoDB 文档数据库 —— 原始数据、爬虫数据
  # mongodb:
  #   image: mongo:7.0
  #   container_name: xh21-mongodb
  #   restart: unless-stopped
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongo_data:/data/db
  #   networks:
  #     - xh21-network

  # Backend API（后续启用）
  # backend:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: xh21-backend
  #   restart: unless-stopped
  #   ports:
  #     - "8000:8000"
